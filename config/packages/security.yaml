security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    
    role_hierarchy:
        ROLE_ADMIN:        [ROLE_GESTIONNAIRE, ROLE_COMPTABLE, ROLE_PROPRIETAIRE, ROLE_LOCATAIRE]
        ROLE_GESTIONNAIRE: [ROLE_USER]
        ROLE_COMPTABLE:    [ROLE_USER]
        ROLE_PROPRIETAIRE: [ROLE_USER]
        ROLE_LOCATAIRE:    [ROLE_USER]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            # jwt: ~ # We will enable this when LexikJWT is fully configured
            
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/locataire, roles: ROLE_LOCATAIRE }
        - { path: ^/proprietaire, roles: ROLE_PROPRIETAIRE }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/biens, roles: ROLE_USER }
        - { path: ^/contrats, roles: ROLE_USER }
        - { path: ^/paiements, roles: ROLE_USER }
        - { path: ^/incidents, roles: ROLE_USER }
        - { path: ^/utilisateurs, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
